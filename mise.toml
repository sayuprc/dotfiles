# mise task runner configuration
# Tasks are distributed in subdirectories

[tasks.help]
description = "Display available tasks"
run = "mise tasks"

[tasks.git]
description = "Setup git"
run = "cd git && mise run all"

[tasks.fish]
description = "Setup fish"
run = "cd fish && mise run all"

[tasks.starship]
description = "Setup starship"
run = "cd starship && mise run all"

[tasks.vim]
description = "Setup vim"
run = "cd vim && mise run all"

[tasks.all]
description = "Run all setup tasks"
depends = ["fish", "git", "starship", "vim"]
